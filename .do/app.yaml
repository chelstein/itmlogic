# Genoa — Digital Ocean App Platform spec.
# Standalone propagation studio for AM / FM / LPFM / FM-translators.
#
# DEPLOY ORDER
# ============
# 1. Create the app from this spec (web service only):
#      doctl apps create --spec .do/app.yaml
#    The service boots in stateless mode — /healthz returns ok, the
#    deterministic engine works, but POST /api/exhibits and /api/assets
#    return 503 until you wire up storage.
#
# 2. Attach managed Postgres POST-DEPLOY:
#      DO Console → Apps → genoa → Create/Attach Database → PostgreSQL.
#    Then copy the connection string from the database's "Connection Details"
#    page and set it as an ENCRYPTED env var on the web component:
#      DATABASE_URL = postgresql://...   (scope: RUN_TIME, encrypted)
#    Genoa runs db/migrate.sql idempotently on every boot, so the schema
#    is created on the next deploy.
#
# 3. Attach Spaces POST-DEPLOY:
#      Create a Space (e.g. "genoa-exhibits") and a Spaces access key.
#      Set these as ENCRYPTED env vars on the web component:
#        SPACES_BUCKET, SPACES_REGION, SPACES_ENDPOINT,
#        SPACES_KEY (encrypted), SPACES_SECRET (encrypted)
#
# Why no `databases:` block here?
#   App Platform's `${db.*}` bindings have historically failed to substitute
#   when the cluster is renamed (db → production-database), leaving the env
#   value as a literal "${db.DATABASE_URL}". Setting DATABASE_URL manually
#   post-deploy is the reliable path.
#
# Update: doctl apps update <APP_ID> --spec .do/app.yaml

name: genoa
# Co-located with the managed Postgres cluster (sfo3) and the
# `ztrps` Spaces bucket (sfo3) to avoid cross-region egress.
region: sfo3

services:
  - name: web
    # Dockerfile path is relative to the REPO ROOT (not source_dir).
    # source_dir scopes the Docker build context so the parent itmlogic
    # Python project (top-level requirements.txt → fiona/GDAL) is never
    # part of the build. We deliberately use Dockerfile rather than the
    # Node buildpack so autodetect can never fall through to the parent
    # Python project.
    dockerfile_path: genoa/Dockerfile
    source_dir: genoa
    github:
      repo: chelstein/itmlogic
      branch: master
      deploy_on_push: true
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080

    health_check:
      # Liveness only — does NOT touch the DB so a transient DB blip
      # does not cycle the container.
      http_path: /healthz
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5

    routes:
      - path: /

    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "8080"

      # ----- Postgres (set post-deploy in the DO console) ---------------
      # Set DATABASE_URL as an encrypted env var on the web component
      # AFTER the managed Postgres is attached. Until then, /api/exhibits
      # returns 503 and the rest of the app runs stateless.
      - key: PG_SSL
        scope: RUN_TIME
        value: "true"
      - key: PG_SSL_REJECT
        scope: RUN_TIME
        value: "false"

      # ----- Spaces (non-secret defaults) -------------------------------
      # Bucket: ztrps in sfo3 (https://ztrps.sfo3.digitaloceanspaces.com).
      # SPACES_KEY and SPACES_SECRET MUST be set as ENCRYPTED env vars on
      # the web component in the DO console — they are intentionally
      # absent from this spec. Without them, /api/assets returns 503 and
      # the rest of the app runs as a pure compute service.
      - key: SPACES_REGION
        scope: RUN_TIME
        value: sfo3
      - key: SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://sfo3.digitaloceanspaces.com
      - key: SPACES_BUCKET
        scope: RUN_TIME
        value: ztrps

      # ----- Terrain DEM (per-radial HAAT, §73.313) ---------------------
      # Public Open-Elevation API by default — no key, free, rate-limited.
      # Swap to a self-hosted OpenTopoData URL for higher throughput /
      # SRTM-1 fidelity. Genoa caches every queried (lat,lon) in
      # genoa_terrain_cache, so repeated computes near the same site
      # are free after the first.
      - key: TERRAIN_PROVIDER
        scope: RUN_TIME
        value: open-elevation
      - key: OPEN_ELEVATION_URL
        scope: RUN_TIME
        value: https://api.open-elevation.com/api/v1/lookup
      - key: TERRAIN_BATCH_LIMIT
        scope: RUN_TIME
        value: "512"
      - key: TERRAIN_TIMEOUT_MS
        scope: RUN_TIME
        value: "20000"
