# Genoa — Digital Ocean App Platform spec.
# Standalone propagation studio for AM / FM / LPFM / FM-translators.
#
# This spec mirrors the live state of the App Platform app exactly so
# that auto-deploys triggered by a master push reconcile cleanly. Past
# generic-internal-error deploys were caused by drift between the live
# app (`seahorse-app` in region `sfo`, with a managed PG bound and an
# ingress rule pointing at the `itmlogic` component) and a more
# minimal repo spec that omitted those fields — App Platform refused
# to apply the changes mid-flight and failed the deploy phase.
#
# Secrets (DATABASE_URL, SPACES_KEY, SPACES_SECRET) are deliberately
# NOT redeclared here so App Platform preserves the encrypted values
# already set on the live component across re-applies. Adding them
# here in plaintext would commit credentials to git; even with
# `type: SECRET` the YAML `value:` field is stored unencrypted in the
# repo.
#
# Update path:
#   doctl apps update <APP_ID> --spec .do/app.yaml
# or push to master (deploy_on_push: true) and the spec auto-reconciles.

name: seahorse-app
region: sfo

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

databases:
  # Auto-attached managed Postgres 17.
  - name: db
    cluster_name: app-c0f0eaf1-ab75-4b6c-a866-df85006d2011
    db_name: db
    db_user: db
    engine: PG
    production: true
    version: "17"

ingress:
  rules:
    - component:
        name: itmlogic
      match:
        authority:
          exact: ""
        path:
          prefix: /

services:
  - name: itmlogic
    # Component name is "itmlogic" (NOT "web") because the DO app was
    # originally created via "Deploy from GitHub" which auto-named the
    # component after the repo. Renaming a component in-place is brittle
    # — it split-brains the deploy log task. Keep this as "itmlogic".
    #
    # Dockerfile build context is the genoa/ subdirectory so the parent
    # itmlogic Python project (top-level requirements.txt → fiona/GDAL)
    # is never part of the build. dockerfile_path is repo-root relative.
    dockerfile_path: genoa/Dockerfile
    source_dir: genoa

    github:
      repo: chelstein/itmlogic
      branch: master
      deploy_on_push: true

    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 2
    http_port: 8080

    health_check:
      http_path: /healthz
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5

    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "8080"

      # ----- Postgres ---------------------------------------------------
      # DATABASE_URL is set as an ENCRYPTED env var on the live
      # component (do not redeclare here — that would wipe it across
      # spec re-applies). PG SSL flags are non-secret defaults.
      - key: PG_SSL
        scope: RUN_TIME
        value: "true"
      - key: PG_SSL_REJECT
        scope: RUN_TIME
        value: "false"

      # ----- Spaces (non-secret defaults; bucket is ztrps in sfo3) ------
      - key: SPACES_REGION
        scope: RUN_TIME
        value: sfo3
      - key: SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://sfo3.digitaloceanspaces.com
      - key: SPACES_BUCKET
        scope: RUN_TIME
        value: ztrps

      # ----- Terrain DEM (per-radial HAAT, §73.313) ---------------------
      - key: TERRAIN_PROVIDER
        scope: RUN_TIME
        value: open-elevation
      - key: OPEN_ELEVATION_URL
        scope: RUN_TIME
        value: https://api.open-elevation.com/api/v1/lookup
      - key: TERRAIN_BATCH_LIMIT
        scope: RUN_TIME
        value: "512"
      - key: TERRAIN_TIMEOUT_MS
        scope: RUN_TIME
        value: "20000"
