version: "3.9"

# Local Genoa stack — full service mesh.
# Sidecars are optional: removing them must NOT break /api/exhibits/compute
# for FM (engine falls back gracefully and emits SIDECAR_UNAVAILABLE).

services:

  genoa-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     genoa
      POSTGRES_PASSWORD: genoa
      POSTGRES_DB:       genoa
    ports: [ "5432:5432" ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genoa"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - genoa-pg:/var/lib/postgresql/data

  genoa-api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      genoa-postgres: { condition: service_healthy }
    environment:
      NODE_ENV:                 development
      PORT:                     "8080"
      DATABASE_URL:             postgres://genoa:genoa@genoa-postgres:5432/genoa
      PG_SSL:                   "false"
      TERRAIN_SIDECAR_URL:      http://genoa-terrain-sidecar:8081
      MEASUREMENT_SIDECAR_URL:  http://genoa-measurement-sidecar:8082
      IDENTITY_SIDECAR_URL:     http://genoa-identity-sidecar:8083
      ZERO_TRUST_RADIO_READONLY_URL: ""
      RADIODNS_RESOLVER_URL:    ""
      SPACES_ENDPOINT:          ""
      SPACES_BUCKET:            ""
      SPACES_ACCESS_KEY_ID:     ""
      SPACES_SECRET_ACCESS_KEY: ""
    ports: [ "8080:8080" ]

  genoa-worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    depends_on:
      genoa-postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://genoa:genoa@genoa-postgres:5432/genoa
      PG_SSL:       "false"
      WORKER_POLL_MS: "5000"

  genoa-terrain-sidecar:
    build:
      context: .
      dockerfile: infra/docker/sidecar-terrain.Dockerfile
    environment:
      PORT: "8081"
      TERRAIN_BACKEND: ""   # set to splat | itmlogic | ztrpsits when wired
    ports: [ "8081:8081" ]

  genoa-measurement-sidecar:
    build:
      context: .
      dockerfile: infra/docker/sidecar-measurement.Dockerfile
    environment:
      PORT: "8082"
    ports: [ "8082:8082" ]

  genoa-identity-sidecar:
    build:
      context: .
      dockerfile: infra/docker/sidecar-identity.Dockerfile
    environment:
      PORT: "8083"
      RADIODNS_RESOLVER_URL: ""
      MASSDNS_RESOLVER_URL:  ""
      EAS_TOOLS_URL:         ""
      ZERO_TRUST_RADIO_READONLY_URL: ""
    ports: [ "8083:8083" ]

volumes:
  genoa-pg:
