<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Genoa contour map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  /* Publication-grade cartographic palette.  Cream paper, light blue
     ocean, white land, dark teal state lines, faint county lines.
     Reads as an engineering survey chart, not a web map. */

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #fcfaf2; color: #1c2e3a;
    font-family: 'Times New Roman', serif;
  }
  #wrap { position: relative; width: 100vw; height: 100vh; }

  /* Title band — survey-sheet header */
  #title-band {
    position: absolute; top: 0; left: 0; right: 0;
    height: 44px; padding: 8px 22px;
    background: #1c2e3a; color: #f3c86d;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid #c4745a;
  }
  #title-band .lhs {
    font-size: 14px; font-family: 'Courier New', monospace;
    letter-spacing: 1.6px; text-transform: uppercase; font-weight: bold;
  }
  #title-band .rhs {
    font-size: 10px; font-family: 'Courier New', monospace;
    opacity: 0.85; letter-spacing: 0.5px;
  }

  /* Figure callout — upper-left of map area */
  #figure-callout {
    position: absolute; top: 60px; left: 36px;
    background: rgba(252, 250, 242, 0.94);
    padding: 4px 10px; border: 1.5px solid #1c2e3a;
    font-family: 'Courier New', monospace; font-size: 9.5px;
    text-transform: uppercase; letter-spacing: 1px; color: #1c2e3a;
    z-index: 500; line-height: 1.3;
  }
  #figure-callout b { color: #c4745a; letter-spacing: 1.4px; }

  /* Map area — thin black survey-style frame */
  #map {
    position: absolute;
    inset: 56px 30px 96px 30px;
    border: 1.5px solid #1c2e3a;
    /* Light blue ocean fill — land polygons paint over this */
    background: #d6e8f2;
  }
  /* Hide tile pane entirely — pure vector */
  .leaflet-tile-pane { display: none !important; }
  .leaflet-container { background: transparent; outline: none; }
  /* Crisp vector strokes */
  .leaflet-overlay-pane svg { shape-rendering: geometricPrecision; }

  /* State name labels — placed via L.tooltip permanent */
  .state-label {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    font-family: 'Times New Roman', serif !important;
    font-size: 11px !important;
    font-style: italic !important;
    color: #5a6975 !important;
    letter-spacing: 1px !important;
    text-transform: uppercase !important;
    white-space: nowrap;
    text-shadow:
      -1px -1px 0 #fffef8, 1px -1px 0 #fffef8,
      -1px  1px 0 #fffef8, 1px  1px 0 #fffef8,
      0 -1px 0 #fffef8, 0 1px 0 #fffef8,
      -1px 0 0 #fffef8, 1px 0 0 #fffef8;
    pointer-events: none;
  }
  .state-label::before { display: none !important; }

  /* Tx site label */
  .tx-label {
    background: rgba(252, 250, 242, 0.94) !important;
    border: 1px solid #1c2e3a !important;
    border-radius: 0 !important;
    padding: 1px 6px !important;
    font-family: 'Courier New', monospace !important;
    font-size: 10px !important;
    color: #1c2e3a !important;
    font-weight: bold;
    box-shadow: none !important;
  }
  .tx-label::before { display: none !important; }

  /* Coordinate ticks */
  .coord-tick {
    position: absolute;
    font-family: 'Courier New', monospace; font-size: 9px;
    color: #1c2e3a; line-height: 1;
    background: #fcfaf2; padding: 1px 4px;
    z-index: 600;
  }

  /* Legend strip below the map */
  #legend {
    position: absolute; bottom: 26px; left: 36px; right: 36px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10.5px;
  }
  #legend .swatches {
    display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
  }
  #legend .swatch { display: inline-flex; align-items: center; gap: 6px; }
  #legend .sq { display: inline-block; width: 14px; height: 12px; border: 1.5px solid; }
  #legend .scale {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Courier New', monospace; font-size: 9.5px;
  }
  #legend .scale-bar-wrap { display: inline-flex; flex-direction: column; align-items: stretch; }
  #legend .scale-bar { display: block; height: 5px; background: #1c2e3a; }
  #legend .scale-ticks {
    display: flex; justify-content: space-between;
    font-size: 8px; margin-top: 2px;
  }

  /* North arrow */
  #north {
    position: absolute; top: 76px; right: 50px;
    width: 42px; height: 56px;
    z-index: 500;
  }
  #north svg { width: 100%; height: 100%; }

  /* Provenance bar at very bottom */
  #provenance {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 14px; padding: 0 22px;
    background: #1c2e3a; color: #fcfaf2;
    font-family: 'Courier New', monospace; font-size: 8.5px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1.5px solid #c4745a;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="title-band">
    <span class="lhs" id="title-station">Station</span>
    <span class="rhs" id="title-meta">FCC §73.333 contour study</span>
  </div>
  <div id="figure-callout">
    <b id="figure-num">FIGURE 1</b><br>
    <span id="figure-label">CONTOUR MAP — 47 CFR §73.333</span>
  </div>
  <div id="map"></div>
  <div id="north" aria-label="north arrow">
    <svg viewBox="0 0 100 130">
      <polygon points="50,4 92,65 50,126 8,65" fill="none" stroke="#1c2e3a" stroke-width="1.5"/>
      <polygon points="50,8 64,68 50,58 36,68" fill="#1c2e3a"/>
      <polygon points="50,122 36,62 50,72 64,62" fill="none" stroke="#1c2e3a" stroke-width="1"/>
      <text x="50" y="42" text-anchor="middle"
            font-family="Courier New, monospace" font-size="13" font-weight="bold"
            fill="#fcfaf2">N</text>
    </svg>
  </div>
  <div id="legend">
    <div class="swatches" id="contour-swatches"></div>
    <div class="scale" id="scale-readout"></div>
  </div>
  <div id="provenance">
    <span id="prov-lhs">NAD83 datum · 47 CFR §73.333 F(50,50)</span>
    <span id="prov-rhs">Genoa FCC Propagation Studio</span>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/topojson-client.min.js"></script>
<script>
(async function(){
  const ex = window.__EXHIBIT__ || {};
  const opts = window.__RENDER_OPTIONS__ || {};
  const s = ex.station_inputs || {};
  const polys = (ex.polygons || []).filter(p => p.closed && p.ring_latlng?.length);
  const itm   = (ex.itm_polygons || []).filter(p => p.closed && p.ring_latlng?.length);

  const lat = Number(s.lat);
  const lon = Number(s.lon);
  const callTag = s.call || s.facility_id || 'Subject Facility';
  const community = s.community || s.city || '';
  const meta = `${(s.service || '—').toUpperCase()} · ${s.frequency ?? '—'} ${s.frequency_unit || 'MHz'} · ERP ${s.erp_kw ?? '—'} kW · HAAT ${s.haat_m_input ?? '—'} m`;

  document.getElementById('title-station').textContent =
    community ? `${callTag} — ${community.toUpperCase()}` : callTag;
  document.getElementById('title-meta').textContent = meta;
  document.getElementById('prov-lhs').textContent =
    `NAD83  ${Number.isFinite(lat) ? lat.toFixed(6) : '—'}, ${Number.isFinite(lon) ? lon.toFixed(6) : '—'}  ·  47 CFR §73.333 F(50,50)`;
  if (opts.figure_num)   document.getElementById('figure-num').textContent   = String(opts.figure_num);
  if (opts.figure_label) document.getElementById('figure-label').textContent = String(opts.figure_label);

  if (!Number.isFinite(lat) || !Number.isFinite(lon)){
    renderCoordsMissingFallback();
    window.__GENOA_MAP_READY__ = true;
    window.dispatchEvent(new Event('genoa-map-ready'));
    return;
  }

  const map = L.map('map', {
    zoomControl: false, attributionControl: false,
    preferCanvas: false,         // SVG so state borders + contours stay crisp
    fadeAnimation: false, zoomAnimation: false,
    inertia: false, worldCopyJump: false
  });

  // ── Load bundled US state TopoJSON (WGS84) and render as vector layers ──
  let states, statesLoaded = false;
  try {
    const r = await fetch('/static/states-10m.json');
    const topo = await r.json();
    states = topojson.feature(topo, topo.objects.states);
    statesLoaded = true;
  } catch (err){
    console.warn('[render] failed to load states topojson:', err);
  }

  // Filled land — single nation outline + per-state polygons.  The
  // ocean color is the map div background (#d6e8f2); land sits on top.
  const stateLayer = statesLoaded ? L.geoJSON(states, {
    style: () => ({
      color:       '#1c2e3a',  // state border
      weight:      1.0,
      opacity:     1.0,
      fillColor:   '#fffef8',  // land fill (warm white over the blue ocean bg)
      fillOpacity: 1.0,
      lineCap:     'round',
      lineJoin:    'round',
      interactive: false
    })
  }).addTo(map) : null;

  // ── Contour polygons (over the cartographic background) ─────────
  const COLORS = ['#b85a3a', '#a85a3f', '#6f4e2a'];
  const swatchHost = document.getElementById('contour-swatches');

  polys.forEach((p, i) => {
    const color = COLORS[i] || '#3b3b3b';
    L.polygon(p.ring_latlng, {
      color, weight: i === 0 ? 2.6 : 1.6, opacity: 1.0,
      fillColor: color, fillOpacity: i === 0 ? 0.18 : 0.06,
      dashArray: i > 0 ? '6,4' : null,
      interactive: false
    }).addTo(map);

    const sw = document.createElement('span');
    sw.className = 'swatch';
    const fillStyle = i === 0 ? `background:${color}33; ` : '';
    const dashStyle = i > 0   ? 'border-style:dashed; '   : '';
    const fsTxt = p.field_strength
      ? `(${p.field_strength.value} ${p.field_strength.unit || ''})`
      : '';
    sw.innerHTML =
      `<span class="sq" style="${fillStyle}${dashStyle}border-color:${color}"></span>` +
      `${escapeHtml(p.label || p.contour_id || 'contour')} ${fsTxt}`;
    swatchHost.appendChild(sw);
  });

  // ITM coverage layer (cyan dashed) when present
  itm.forEach((p) => {
    L.polygon(p.ring_latlng, {
      color: '#3a7a9a', weight: 1.6, opacity: 0.95,
      fillColor: '#3a7a9a', fillOpacity: 0.06,
      dashArray: '6,4', interactive: false
    }).addTo(map);
    const sw = document.createElement('span');
    sw.className = 'swatch';
    sw.innerHTML =
      `<span class="sq" style="border-color:#3a7a9a; border-style:dashed"></span>ITM coverage`;
    swatchHost.appendChild(sw);
  });

  // ── Tx marker (crosshair + amber center) + call-sign label ──────
  const txIcon = L.divIcon({
    className: 'tx-marker',
    html:
      `<svg viewBox="-12 -12 24 24" width="22" height="22" style="overflow:visible">
         <line x1="-11" y1="0" x2="-3.5" y2="0" stroke="#1c2e3a" stroke-width="1.5"/>
         <line x1="3.5"  y1="0" x2="11"   y2="0" stroke="#1c2e3a" stroke-width="1.5"/>
         <line x1="0" y1="-11" x2="0" y2="-3.5" stroke="#1c2e3a" stroke-width="1.5"/>
         <line x1="0" y1="3.5" x2="0" y2="11"   stroke="#1c2e3a" stroke-width="1.5"/>
         <circle cx="0" cy="0" r="3.5" fill="#c4745a" stroke="#1c2e3a" stroke-width="1.4"/>
       </svg>`,
    iconSize:   [22, 22],
    iconAnchor: [11, 11]
  });
  L.marker([lat, lon], { icon: txIcon, interactive: false }).addTo(map);
  if (callTag){
    L.tooltip({
      permanent: true, direction: 'right', offset: [12, 0],
      className: 'tx-label', interactive: false
    })
      .setContent(escapeHtml(callTag))
      .setLatLng([lat, lon])
      .addTo(map);
  }

  // ── Frame the contour extent ────────────────────────────────────
  const allPts = [...polys, ...itm].flatMap(p => p.ring_latlng || []);
  if (allPts.length){
    map.fitBounds(L.latLngBounds(allPts).pad(0.22));
  } else {
    map.setView([lat, lon], 9);
  }

  // ── State name labels — only the ones whose centroid is inside
  // the current map view.  Uses Leaflet's tooltip system so the
  // labels track pan/zoom for free.  We do this AFTER fitBounds so
  // we know which states are in view.
  if (statesLoaded){
    const visibleBounds = map.getBounds();
    states.features.forEach(f => {
      const c = featureCentroid(f);
      if (!c) return;
      if (!visibleBounds.contains([c[1], c[0]])) return;
      L.tooltip({
        permanent: true, direction: 'center',
        className: 'state-label', interactive: false
      })
        .setContent(escapeHtml(f.properties?.name || ''))
        .setLatLng([c[1], c[0]])
        .addTo(map);
    });
  }

  // ── Scale bar + coord ticks ─────────────────────────────────────
  function drawScaleBar(){
    const widthMeters = map.distance(
      map.containerPointToLatLng([0, 0]),
      map.containerPointToLatLng([map.getSize().x, 0])
    );
    const step = widthMeters > 100000 ? 25000 : widthMeters > 40000 ? 10000 : 5000;
    const n = Math.max(2, Math.min(5, Math.round(widthMeters / 4 / step) || 2));
    const totalKm = (step * n) / 1000;
    const px = (step * n) / widthMeters * map.getSize().x;
    document.getElementById('scale-readout').innerHTML =
      `<span style="font-size:9px;letter-spacing:1px">SCALE</span>` +
      `<div class="scale-bar-wrap" style="width:${Math.round(px)}px">` +
        `<span class="scale-bar"></span>` +
        `<div class="scale-ticks"><span>0</span><span>${totalKm} km</span></div>` +
      `</div>`;
  }

  function drawCoordinateTicks(){
    const wrapEl = document.getElementById('wrap');
    wrapEl.querySelectorAll('.coord-tick').forEach(el => el.remove());
    const r  = document.getElementById('map').getBoundingClientRect();
    const wr = wrapEl.getBoundingClientRect();
    const b = map.getBounds();
    const minLat = b.getSouth(), maxLat = b.getNorth();
    const minLon = b.getWest(),  maxLon = b.getEast();
    const left   = r.left   - wr.left;
    const right  = r.right  - wr.left;
    const top    = r.top    - wr.top;
    const bottom = r.bottom - wr.top;

    function add(text, leftPx, topPx, transform){
      const t = document.createElement('div');
      t.className = 'coord-tick';
      t.textContent = text;
      t.style.left = leftPx + 'px';
      t.style.top  = topPx  + 'px';
      if (transform) t.style.transform = transform;
      wrapEl.appendChild(t);
    }
    add(maxLat.toFixed(3) + '°N', left  - 4, top    - 14, 'translateX(-100%)');
    add(formatLon(maxLon),         right + 4, top    - 14, '');
    add(minLat.toFixed(3) + '°N', left  - 4, bottom + 4,  'translateX(-100%)');
    add(formatLon(minLon),         right + 4, bottom + 4,  '');
  }

  function formatLon(lon){
    const v = Math.abs(lon).toFixed(3);
    return `${v}°${lon < 0 ? 'W' : 'E'}`;
  }

  // ── Centroid helper for state name placement ────────────────────
  // Cheap polygon centroid using vertex average of the largest ring;
  // good enough for labeling US states whose shapes are convex-ish
  // and we don't need pixel-perfect placement.
  function featureCentroid(f){
    const g = f.geometry;
    if (!g) return null;
    let coords;
    if (g.type === 'Polygon')          coords = g.coordinates[0];
    else if (g.type === 'MultiPolygon'){
      // pick the ring with the most vertices (largest contiguous land mass)
      let biggest = g.coordinates[0][0];
      for (const poly of g.coordinates){
        if (poly[0].length > biggest.length) biggest = poly[0];
      }
      coords = biggest;
    }
    else return null;
    let lon = 0, lat = 0;
    for (const [x, y] of coords){ lon += x; lat += y; }
    return [lon / coords.length, lat / coords.length];
  }

  // ── Signal ready as soon as layout is settled ───────────────────
  // requestAnimationFrame x2 = "next paint after the current paint"
  // — by the time the second frame fires Leaflet has projected all
  // vector layers and DOM is consistent.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      drawScaleBar();
      drawCoordinateTicks();
      window.__GENOA_MAP_READY__ = true;
      window.dispatchEvent(new Event('genoa-map-ready'));
    });
  });

  function renderCoordsMissingFallback(){
    document.getElementById('map').innerHTML =
      `<div style="display:flex;flex-direction:column;height:100%;` +
              `align-items:center;justify-content:center;` +
              `font-family:'Times New Roman',serif;color:#666;padding:24px;text-align:center;background:#fcfaf2">
         <div style="font-size:14px;color:#1c2e3a;margin-bottom:8px;letter-spacing:1px">COORDINATES NOT PROVIDED</div>
         <div style="font-size:11px;font-style:italic;max-width:480px;line-height:1.5">
           A printable contour map cannot be rendered without antenna lat/lon.
           The compliance distances (mean radial km) and radial table are
           still reported in the Engineering Statement; this figure will
           re-render automatically once filed coordinates are entered and
           the exhibit is recomputed.
         </div>
       </div>`;
    document.getElementById('north').style.display = 'none';
    document.getElementById('figure-callout').style.display = 'none';
  }

  function escapeHtml(s){
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
})();
</script>
</body>
</html>
