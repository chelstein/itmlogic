# Genoa — Digital Ocean App Platform spec.
# ============================================================
# THIS FILE IS A REFERENCE — IT IS NOT READ BY APP PLATFORM.
# ------------------------------------------------------------
# This spec lives at `genoa/.do.example/app.yaml` (note the
# `.example` suffix on the directory) precisely so App Platform
# does NOT pick it up on every push and try to reconcile its
# fields against the live console-configured app — which has
# repeatedly caused "Generic Internal Error" deploy-phase
# failures whenever the live state drifted from the repo spec
# (instance size, DB attach/detach, region, env var edits
# performed in the console).
#
# The deployable app is configured in the DO Console:
#   Apps → seahorse-app → Settings (component itmlogic)
# Pushes to master trigger code rebuilds against the existing
# console configuration; nothing in this file is applied.
#
# To bootstrap a NEW App Platform deployment from this file:
#   1. Copy this file to .do/app.yaml at the REPO ROOT
#   2. doctl apps create --spec .do/app.yaml
#   3. Move it back to genoa/.do.example/app.yaml so subsequent
#      pushes don't re-trigger reconciliation.
# ============================================================

name: seahorse-app
region: sfo

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

databases:
  - name: db
    cluster_name: app-c0f0eaf1-ab75-4b6c-a866-df85006d2011
    db_name: db
    db_user: db
    engine: PG
    production: true
    version: "17"

ingress:
  rules:
    - component:
        name: itmlogic
      match:
        authority:
          exact: ""
        path:
          prefix: /

services:
  - name: itmlogic
    dockerfile_path: genoa/Dockerfile
    source_dir: genoa

    github:
      repo: chelstein/itmlogic
      branch: master
      deploy_on_push: true

    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 2
    http_port: 8080

    health_check:
      http_path: /healthz
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5

    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "8080"

      # ----- Postgres ---------------------------------------------------
      # DATABASE_URL is set as an ENCRYPTED env var on the live component.
      - key: PG_SSL
        scope: RUN_TIME
        value: "true"
      - key: PG_SSL_REJECT
        scope: RUN_TIME
        value: "false"

      # ----- Spaces (non-secret defaults; bucket is ztrps in sfo3) ------
      - key: SPACES_REGION
        scope: RUN_TIME
        value: sfo3
      - key: SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://sfo3.digitaloceanspaces.com
      - key: SPACES_BUCKET
        scope: RUN_TIME
        value: ztrps

      # ----- Terrain DEM (per-radial HAAT, §73.313) ---------------------
      - key: TERRAIN_PROVIDER
        scope: RUN_TIME
        value: open-elevation
      - key: OPEN_ELEVATION_URL
        scope: RUN_TIME
        value: https://api.open-elevation.com/api/v1/lookup
      - key: TERRAIN_BATCH_LIMIT
        scope: RUN_TIME
        value: "512"
      - key: TERRAIN_TIMEOUT_MS
        scope: RUN_TIME
        value: "20000"
